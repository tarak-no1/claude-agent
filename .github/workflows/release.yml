name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build universal macOS binary
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/claude-agent-arm64 ./cmd/agent
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/claude-agent-amd64 ./cmd/agent
          lipo -create -output dist/claude-agent dist/claude-agent-arm64 dist/claude-agent-amd64

      - name: Package tarball
        run: |
          cd dist
          tar -czf claude-agent-${{ github.ref_name }}-darwin.tar.gz claude-agent

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 dist/claude-agent-${{ github.ref_name }}-darwin.tar.gz | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${{ github.ref_name }}
          SHA=${{ steps.sha.outputs.sha }}
          FILE=Formula/claude-agent.rb

          # Fetch current file content + blob SHA from tap repo
          RESPONSE=$(curl -s -H "Authorization: token ${TAP_TOKEN}" \
            "https://api.github.com/repos/tarak-no1/homebrew-tap/contents/${FILE}")
          BLOB_SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          CONTENT=$(echo "$RESPONSE" | python3 -c "import sys,json,base64; print(base64.b64decode(json.load(sys.stdin)['content']).decode())")

          # Update formula fields
          UPDATED=$(echo "$CONTENT" \
            | sed "s|url \".*\"|url \"https://github.com/tarak-no1/claude-agent/releases/download/${VERSION}/claude-agent-${VERSION}-darwin.tar.gz\"|" \
            | sed "s|sha256 \".*\"|sha256 \"${SHA}\"|" \
            | sed "s|version \".*\"|version \"${VERSION#v}\"|")

          ENCODED=$(echo "$UPDATED" | base64)

          # Push update via API
          curl -s -X PUT -H "Authorization: token ${TAP_TOKEN}" \
            "https://api.github.com/repos/tarak-no1/homebrew-tap/contents/${FILE}" \
            -d "{\"message\":\"chore: update claude-agent to ${VERSION}\",\"content\":\"${ENCODED}\",\"sha\":\"${BLOB_SHA}\"}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/claude-agent-${{ github.ref_name }}-darwin.tar.gz
          body: |
            ## Install

            ```bash
            brew install tarak-no1/tap/claude-agent
            ```

            Or download manually, unzip, and run:
            ```bash
            chmod +x claude-agent
            ./claude-agent <session-token>
            ```

            ## SHA256
            `${{ steps.sha.outputs.sha }}`
